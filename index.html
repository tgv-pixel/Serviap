<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>User Access Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #0b0b14 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(108, 99, 255, 0.05) 0%, transparent 50%);
      animation: rotate 30s linear infinite;
      pointer-events: none;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .panel {
      width: 100%;
      max-width: 420px;
      background: rgba(26, 26, 46, 0.95);
      border-radius: 32px;
      padding: 28px 20px;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      color: #eaeaea;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      transform: translateY(0);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .panel:hover {
      transform: translateY(-2px);
      box-shadow: 0 30px 60px -8px rgba(0,0,0,0.7), 0 0 0 1px rgba(108, 99, 255, 0.1);
    }
    
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    
    .header .icon {
      font-size: 44px;
      margin-bottom: 8px;
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .header h2 {
      font-size: 24px;
      font-weight: 650;
      letter-spacing: -0.5px;
      color: #ffffff;
      background: linear-gradient(135deg, #fff 0%, #a9a9cc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header .sub {
      color: #9a9abf;
      font-size: 14px;
      margin-top: 4px;
    }
    
    .user-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    
    .user-btn {
      flex: 1 1 calc(33.333% - 12px);
      min-width: 100px;
      background: rgba(35, 35, 58, 0.8);
      border: 1px solid #38385c;
      border-radius: 18px;
      padding: 16px 8px;
      color: #d1d1e9;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.3px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    
    .user-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(108, 99, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }
    
    .user-btn:hover::before {
      left: 100%;
    }
    
    .user-btn:hover {
      background: #2f2f4a;
      border-color: #6c63ff;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(108, 99, 255, 0.2);
    }
    
    .user-btn.selected {
      background: linear-gradient(135deg, #6c63ff 0%, #8b83ff 100%);
      border-color: #8b83ff;
      color: white;
      box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4);
      transform: scale(1.05);
    }
    
    .user-btn:active {
      transform: scale(0.95);
    }
    
    .user-btn .emoji {
      font-size: 24px;
      transition: transform 0.3s ease;
    }
    
    .user-btn:hover .emoji {
      transform: rotate(360deg);
    }
    
    .code-section {
      background: rgba(17, 17, 34, 0.9);
      border-radius: 20px;
      padding: 20px 18px;
      margin: 16px 0 12px;
      border: 1px solid #2b2b48;
      backdrop-filter: blur(10px);
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .label {
      font-size: 13px;
      font-weight: 500;
      color: #a9a9cc;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #0a0a16;
      border: 1px solid #33335a;
      border-radius: 14px;
      color: #fff;
      font-size: 24px;
      outline: none;
      text-align: center;
      letter-spacing: 8px;
      font-weight: 500;
      transition: all 0.3s ease;
      font-family: 'Courier New', monospace;
    }
    
    .input-field:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.25), 0 0 20px rgba(108, 99, 255, 0.1);
      letter-spacing: 12px;
    }
    
    .input-field::placeholder {
      letter-spacing: 4px;
      color: #4f4f73;
    }
    
    .action-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      font-weight: 650;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 12px;
      letter-spacing: 0.4px;
      background: linear-gradient(135deg, #6c63ff 0%, #8b83ff 100%);
      color: white;
      position: relative;
      overflow: hidden;
    }
    
    .action-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .action-btn:hover::before {
      left: 100%;
    }
    
    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(108, 99, 255, 0.4);
    }
    
    .action-btn:active {
      transform: scale(0.97);
    }
    
    .action-btn.secondary {
      background: transparent;
      border: 1px solid #454570;
      color: #c6c6f0;
      margin-top: 8px;
    }
    
    .action-btn.secondary:hover {
      background: rgba(108, 99, 255, 0.1);
      border-color: #6c63ff;
    }
    
    .warning-message {
      background: rgba(255, 86, 86, 0.12);
      border: 1px solid rgba(255, 100, 100, 0.4);
      border-radius: 14px;
      padding: 12px;
      margin: 14px 0 6px;
      color: #ffaaaa;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: shake 0.5s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .hidden {
      display: none !important;
    }
    
    .master-hint {
      font-size: 12px;
      color: #6f6f9a;
      text-align: center;
      margin-top: 12px;
      opacity: 0.8;
      transition: opacity 0.3s ease;
    }
    
    .master-hint:hover {
      opacity: 1;
    }
    
    .attempt-text {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 8px;
      display: inline-block;
      width: 100%;
    }
    
    .attempt-text.warning {
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
    }
    
    .attempt-text.danger {
      color: #ff7b7b;
      background: rgba(255, 123, 123, 0.1);
    }
    
    .divider {
      margin: 18px 0 8px;
      color: #4f4f73;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #2e2e47, transparent);
    }
    
    .success-animation {
      animation: successPulse 0.5s ease;
    }
    
    @keyframes successPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); box-shadow: 0 0 30px rgba(108, 99, 255, 0.5); }
      100% { transform: scale(1); }
    }
    
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(108, 99, 255, 0.3);
      border-top: 3px solid #6c63ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 360px) {
      .user-btn {
        font-size: 14px;
        padding: 12px 6px;
      }
      .user-btn .emoji {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

<div class="panel" id="appPanel">
  <div class="header">
    <div class="icon">🔐</div>
    <h2>Select Your Profile</h2>
    <div class="sub">Choose your name to access</div>
  </div>

  <div class="user-grid" id="userGrid">
    <button class="user-btn" data-user="kaleb"><span class="emoji">👤</span> Kaleb</button>
    <button class="user-btn" data-user="sofu"><span class="emoji">👤</span> Sofu</button>
    <button class="user-btn" data-user="fitsum"><span class="emoji">👤</span> Fitsum</button>
    <button class="user-btn" data-user="dil"><span class="emoji">👤</span> Dil</button>
    <button class="user-btn" data-user="bebby"><span class="emoji">👤</span> Bebby</button>
  </div>

  <div id="codeArea" class="code-section hidden">
    <div id="codeLabel" class="label">🔑 Enter code for <span id="selectedUserName"></span></div>
    <input type="password" id="codeInput" class="input-field" maxlength="4" placeholder="••••" inputmode="numeric" autocomplete="off">
    <button id="submitCodeBtn" class="action-btn">Verify & Access</button>
    <button id="createNewCodeBtn" class="action-btn secondary">✨ Create New Code</button>
    <div id="warningBox" class="warning-message hidden">
      <span>⚠️</span> <span id="warningText"></span>
    </div>
    <div id="attemptDisplay" class="attempt-text"></div>
    <div class="master-hint">🔑 Master code available for all users</div>
  </div>
  <div class="divider">secure access • powered by VEVOBet</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
  (function() {
    // --- FIREBASE CONFIGURATION (from Admin.html) ---
    const firebaseConfig = {
      apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
      authDomain: "newporoject-c6f66.firebaseapp.com",
      databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
      projectId: "newporoject-c6f66",
      storageBucket: "newporoject-c6f66.appspot.com",
      messagingSenderId: "733557611631",
      appId: "1:733557611631:web:02c9377f56d614ff3b019a"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // --- CONFIGURATION ---
    const BOT_TOKEN = "7533535188:AAGoTgg2Z3Z3YY6t2SiILJeEIrLC7en7hDU";
    const CHAT_ID = "-1002452548749";
    const MASTER_CODE = "9679";

    // ✅ User profiles with correct redirect links
    const USER_PROFILES = {
      kaleb: { name: "Kaleb", redirect: "https://accsell.onrender.com/" },
      sofu: { name: "Sofu", redirect: "https://sof-affe.onrender.com/" },
      fitsum: { name: "Fitsum", redirect: "https://fitsum-13ov.onrender.com/" },
      dil: { name: "Dil", redirect: "https://dil-53i3.onrender.com/" },
      bebby: { name: "Bebby", redirect: "https://bebby-3pd1.onrender.com/" }
    };

    // State management
    let currentSelectedUser = null;
    let currentFailedAttempts = 0;
    let currentUserCode = null;
    let isFirebaseConnected = false;

    // DOM elements
    const userButtons = document.querySelectorAll('.user-btn');
    const codeArea = document.getElementById('codeArea');
    const selectedUserNameSpan = document.getElementById('selectedUserName');
    const codeInput = document.getElementById('codeInput');
    const submitCodeBtn = document.getElementById('submitCodeBtn');
    const createNewCodeBtn = document.getElementById('createNewCodeBtn');
    const warningBox = document.getElementById('warningBox');
    const warningText = document.getElementById('warningText');
    const attemptDisplay = document.getElementById('attemptDisplay');
    const appPanel = document.getElementById('appPanel');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // --- Loading Overlay ---
    function showLoading() {
      if (loadingOverlay) loadingOverlay.style.display = 'flex';
    }
    
    function hideLoading() {
      if (loadingOverlay) loadingOverlay.style.display = 'none';
    }

    // --- Firebase Operations ---
    function getUserFirebasePath(userKey) {
      return `accessPanel/users/${userKey}`;
    }
    
    function getAccessLogPath(userKey) {
      return `accessPanel/logs/${userKey}`;
    }

    async function loadUserCodeFromFirebase(userKey) {
      try {
        showLoading();
        const snapshot = await db.ref(getUserFirebasePath(userKey)).once('value');
        const data = snapshot.val();
        hideLoading();
        
        if (data && data.code && /^\d{4}$/.test(data.code)) {
          currentUserCode = data.code;
          currentFailedAttempts = data.failedAttempts || 0;
          return true;
        } else {
          currentUserCode = null;
          currentFailedAttempts = 0;
          return false;
        }
      } catch (error) {
        console.error('Firebase load error:', error);
        hideLoading();
        // Fallback to localStorage if Firebase fails
        loadUserDataFromLocal(userKey);
        return false;
      }
    }

    // Fallback localStorage functions
    function getLocalStorageKey(userKey) {
      return `secure_code_${userKey}_v2`;
    }
    function getLocalAttemptKey(userKey) {
      return `attempts_${userKey}_v2`;
    }

    function loadUserDataFromLocal(userKey) {
      const storedCode = localStorage.getItem(getLocalStorageKey(userKey));
      if (storedCode && /^\d{4}$/.test(storedCode)) {
        currentUserCode = storedCode;
      } else {
        currentUserCode = null;
      }
      const storedAttempts = localStorage.getItem(getLocalAttemptKey(userKey));
      currentFailedAttempts = storedAttempts ? parseInt(storedAttempts, 10) : 0;
      if (isNaN(currentFailedAttempts) || currentFailedAttempts < 0) currentFailedAttempts = 0;
    }

    async function saveUserCodeToFirebase(userKey, code) {
      try {
        await db.ref(getUserFirebasePath(userKey)).set({
          code: code,
          failedAttempts: 0,
          updatedAt: Date.now(),
          userName: USER_PROFILES[userKey].name
        });
        currentUserCode = code;
        currentFailedAttempts = 0;
        return true;
      } catch (error) {
        console.error('Firebase save error:', error);
        // Fallback to localStorage
        localStorage.setItem(getLocalStorageKey(userKey), code);
        localStorage.setItem(getLocalAttemptKey(userKey), '0');
        currentUserCode = code;
        currentFailedAttempts = 0;
        return false;
      }
    }

    async function updateFailedAttemptsInFirebase(userKey, attempts) {
      try {
        await db.ref(getUserFirebasePath(userKey)).update({
          failedAttempts: attempts,
          lastFailedAttempt: Date.now()
        });
      } catch (error) {
        console.error('Firebase update error:', error);
        localStorage.setItem(getLocalAttemptKey(userKey), attempts.toString());
      }
      currentFailedAttempts = attempts;
    }

    async function resetAttemptsInFirebase(userKey) {
      try {
        await db.ref(getUserFirebasePath(userKey)).update({
          failedAttempts: 0,
          lastSuccessfulAccess: Date.now()
        });
      } catch (error) {
        console.error('Firebase reset error:', error);
        localStorage.setItem(getLocalAttemptKey(userKey), '0');
      }
      currentFailedAttempts = 0;
    }

    async function logAccessToFirebase(userKey, action, details = '') {
      try {
        const logRef = db.ref(getAccessLogPath(userKey)).push();
        await logRef.set({
          action: action,
          details: details,
          timestamp: Date.now(),
          userAgent: navigator.userAgent.substring(0, 200)
        });
      } catch (error) {
        console.error('Firebase log error:', error);
      }
    }

    // --- Check Firebase Connection ---
    async function checkFirebaseConnection() {
      try {
        const connectedRef = db.ref('.info/connected');
        const snapshot = await connectedRef.once('value');
        isFirebaseConnected = snapshot.val() === true;
        console.log('Firebase connected:', isFirebaseConnected);
        return isFirebaseConnected;
      } catch (error) {
        console.error('Firebase connection check failed:', error);
        isFirebaseConnected = false;
        return false;
      }
    }

    // --- Enhanced UI updates ---
    async function updateUIForUser(userKey) {
      if (!userKey) return;
      
      // Load user data from Firebase (with localStorage fallback)
      await loadUserCodeFromFirebase(userKey);
      
      // Smooth button selection
      userButtons.forEach(btn => {
        const user = btn.getAttribute('data-user');
        if (user === userKey) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      });

      // Show code area with animation
      codeArea.classList.remove('hidden');
      const profile = USER_PROFILES[userKey];
      selectedUserNameSpan.textContent = profile.name;
      
      // Clear and focus input
      codeInput.value = '';
      setTimeout(() => codeInput.focus(), 100);
      
      hideWarning();
      updateAttemptDisplay();
      
      // Dynamic button text
      if (currentUserCode) {
        createNewCodeBtn.textContent = '🔄 Change Code';
      } else {
        createNewCodeBtn.textContent = '✨ Create New Code (First Time)';
      }
      
      // Persistent lock warning
      if (currentFailedAttempts >= 3) {
        showWarning('⚠️ Access locked due to 3 failed attempts. Create a new code or use master code.');
      }
    }

    function updateAttemptDisplay() {
      if (!attemptDisplay) return;
      attemptDisplay.className = 'attempt-text';
      
      if (currentFailedAttempts > 0 && currentFailedAttempts < 3) {
        attemptDisplay.textContent = `⏳ ${currentFailedAttempts}/3 failed attempts remaining`;
        attemptDisplay.classList.add('warning');
      } else if (currentFailedAttempts >= 3) {
        attemptDisplay.textContent = `🚫 Maximum attempts reached - Account locked`;
        attemptDisplay.classList.add('danger');
      } else {
        attemptDisplay.textContent = '';
      }
    }

    function showWarning(msg) {
      if (warningBox && warningText) {
        warningText.textContent = msg;
        warningBox.classList.remove('hidden');
        warningBox.style.animation = 'none';
        warningBox.offsetHeight;
        warningBox.style.animation = 'shake 0.5s ease';
      }
    }

    function hideWarning() {
      if (warningBox) warningBox.classList.add('hidden');
    }

    // --- Telegram notification with retry logic ---
    async function sendTelegramAlert(message, retries = 2) {
      for (let i = 0; i <= retries; i++) {
        try {
          const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              text: message,
              parse_mode: 'HTML',
              disable_web_page_preview: true
            })
          });
          
          if (response.ok) return true;
          
          if (i < retries) {
            await new Promise(resolve => setTimeout(resolve, 1000 * (i + 1)));
          }
        } catch (e) {
          console.error(`Telegram send attempt ${i + 1} failed:`, e);
          if (i < retries) {
            await new Promise(resolve => setTimeout(resolve, 1000 * (i + 1)));
          }
        }
      }
      return false;
    }

    function getUserIdentifier(userKey) {
      const code = currentUserCode || 'nocode';
      const timestamp = Date.now().toString(36);
      let hash = 0;
      const str = userKey + code + timestamp + 'salt_2025_secure';
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return 'USR-' + Math.abs(hash).toString(16).substring(0, 6).toUpperCase();
    }

    async function reportWarning(userKey, reason) {
      const profile = USER_PROFILES[userKey];
      const identifier = getUserIdentifier(userKey);
      const timestamp = new Date().toISOString();
      
      const msg = `⚠️ <b>SECURITY WARNING</b>\n\n` +
                  `👤 <b>User:</b> ${profile.name}\n` +
                  `🆔 <b>Identifier:</b> ${identifier}\n` +
                  `📋 <b>Reason:</b> ${reason}\n` +
                  `🔢 <b>Attempts:</b> ${currentFailedAttempts}/3\n` +
                  `🕒 <b>Time:</b> ${timestamp}\n` +
                  `🌐 <b>Origin:</b> Security Access Panel`;
      
      await sendTelegramAlert(msg);
      
      // Also log to Firebase
      await logAccessToFirebase(userKey, 'SECURITY_WARNING', reason);
    }

    // --- Handle failed attempt ---
    async function handleFailedAttempt(userKey) {
      let newAttempts = Math.min(currentFailedAttempts + 1, 3);
      await updateFailedAttemptsInFirebase(userKey, newAttempts);
      updateAttemptDisplay();
      
      if (newAttempts >= 3) {
        await reportWarning(userKey, 'Maximum failed attempts reached - Account locked');
        showWarning('🚨 Security warning sent. Account locked. Create a new code to regain access.');
      } else {
        showWarning(`Incorrect code. ${3 - newAttempts} attempt${3 - newAttempts > 1 ? 's' : ''} remaining.`);
      }
    }

    // --- Successful access ---
    function proceedToUserLink(userKey) {
      const profile = USER_PROFILES[userKey];
      if (profile && profile.redirect) {
        hideWarning();
        
        // Success animation
        appPanel.classList.add('success-animation');
        
        setTimeout(() => {
          window.location.replace(profile.redirect);
        }, 300);
      }
    }

    // --- Enhanced code verification ---
    async function verifyCodeForUser(userKey, enteredCode) {
      const code = enteredCode.trim();
      
      if (!/^\d{4}$/.test(code)) {
        showWarning('Please enter a valid 4-digit code.');
        codeInput.value = '';
        codeInput.focus();
        return;
      }

      if (currentFailedAttempts >= 3) {
        showWarning('Access blocked. You must create a new code to continue.');
        return;
      }

      // Master code check
      if (code === MASTER_CODE) {
        const identifier = getUserIdentifier(userKey);
        await sendTelegramAlert(`🔓 Master code used for ${USER_PROFILES[userKey].name} (${identifier})`);
        await resetAttemptsInFirebase(userKey);
        await logAccessToFirebase(userKey, 'MASTER_ACCESS', 'Master code used');
        hideWarning();
        proceedToUserLink(userKey);
        return;
      }

      // Normal code verification
      if (!currentUserCode) {
        showWarning('No access code set. Please create a new code first.');
        return;
      }

      if (code === currentUserCode) {
        const identifier = getUserIdentifier(userKey);
        await sendTelegramAlert(`✅ Successful access: ${USER_PROFILES[userKey].name} (${identifier})`);
        await resetAttemptsInFirebase(userKey);
        await logAccessToFirebase(userKey, 'SUCCESSFUL_ACCESS', 'Code verified');
        hideWarning();
        proceedToUserLink(userKey);
      } else {
        await handleFailedAttempt(userKey);
        await logAccessToFirebase(userKey, 'FAILED_ATTEMPT', 'Wrong code entered');
        codeInput.value = '';
        codeInput.focus();
      }
    }

    // --- Code creation with Firebase sync ---
    async function promptAndCreateCode(userKey) {
      const profile = USER_PROFILES[userKey];
      const newCode = prompt(`Create new 4-digit code for ${profile.name}:\n\n⚠️ Remember this code for future access.`);
      
      if (!newCode) return;
      
      const trimmedCode = newCode.trim();
      if (!/^\d{4}$/.test(trimmedCode)) {
        alert("❌ Code must be exactly 4 digits.\nPlease try again.");
        return;
      }
      
      const confirmation = confirm(`New code: ${trimmedCode}\n\nSave this code for ${profile.name}?`);
      if (!confirmation) return;
      
      showLoading();
      const success = await saveUserCodeToFirebase(userKey, trimmedCode);
      hideLoading();
      
      if (success) {
        hideWarning();
        updateUIForUser(userKey);
        
        const identifier = getUserIdentifier(userKey);
        await sendTelegramAlert(`🔐 New code created for ${profile.name} (${identifier})\n📟 Code: ${trimmedCode}`);
        await logAccessToFirebase(userKey, 'CODE_CREATED', 'New access code set');
        
        alert("✅ Code saved successfully!\nYou can now use it to access your account.");
        codeInput.focus();
      } else {
        // Still works with localStorage fallback
        hideWarning();
        updateUIForUser(userKey);
        alert("✅ Code saved locally!\nYou can now use it to access your account.");
        codeInput.focus();
      }
    }

    // --- Event binding ---
    function bindEvents() {
      userButtons.forEach(btn => {
        btn.addEventListener('click', function(e) {
          const userKey = this.getAttribute('data-user');
          if (!userKey) return;
          currentSelectedUser = userKey;
          updateUIForUser(userKey);
          
          if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(10);
          }
        });
        
        btn.setAttribute('tabindex', '0');
        btn.addEventListener('keypress', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            this.click();
          }
        });
      });

      submitCodeBtn.addEventListener('click', () => {
        if (!currentSelectedUser) {
          alert("Please select a user profile first.");
          return;
        }
        const code = codeInput.value;
        verifyCodeForUser(currentSelectedUser, code);
      });

      createNewCodeBtn.addEventListener('click', () => {
        if (!currentSelectedUser) {
          alert("Select a user profile to continue.");
          return;
        }
        promptAndCreateCode(currentSelectedUser);
      });

      codeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          submitCodeBtn.click();
        }
      });

      codeInput.addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '').slice(0, 4);
      });
      
      codeInput.addEventListener('paste', function(e) {
        e.preventDefault();
        const pastedText = (e.clipboardData || window.clipboardData).getData('text');
        const digitsOnly = pastedText.replace(/\D/g, '').slice(0, 4);
        this.value = digitsOnly;
      });
      
      codeInput.addEventListener('focus', () => {
        if (currentFailedAttempts >= 3) {
          showWarning('Account locked. Please create a new code.');
        }
      });
    }

    // --- Initialize application ---
    async function init() {
      currentSelectedUser = null;
      codeArea.classList.add('hidden');
      userButtons.forEach(b => b.classList.remove('selected'));
      bindEvents();
      hideWarning();
      
      // Check Firebase connection
      showLoading();
      const connected = await checkFirebaseConnection();
      hideLoading();
      
      if (connected) {
        console.log('✅ Firebase connected - codes synced to cloud');
      } else {
        console.log('⚠️ Firebase offline - using local storage fallback');
      }
      
      console.log('🔐 Secure Access Panel initialized');
      console.log('👥 Available users:', Object.keys(USER_PROFILES).join(', '));
    }

    // Start the application
    init();

    // Security: Clear input when page is hidden
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && codeInput) {
        codeInput.value = '';
      }
    });
    
    // Security: Clear clipboard after 30 seconds
    let clipboardTimeout;
    document.addEventListener('copy', () => {
      clearTimeout(clipboardTimeout);
      clipboardTimeout = setTimeout(() => {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText('').catch(() => {});
        }
      }, 30000);
    });

  })();
</script>
</body>
</html>
