<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>User Access Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: #0b0b14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .panel {
      width: 100%;
      max-width: 420px;
      background: #1a1a2e;
      border-radius: 32px;
      padding: 28px 20px;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      color: #eaeaea;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header .icon {
      font-size: 44px;
      margin-bottom: 8px;
    }
    .header h2 {
      font-size: 24px;
      font-weight: 650;
      letter-spacing: -0.5px;
      color: #ffffff;
    }
    .header .sub {
      color: #9a9abf;
      font-size: 14px;
      margin-top: 4px;
    }
    .user-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .user-btn {
      flex: 1 1 calc(33.333% - 12px);
      min-width: 100px;
      background: #23233a;
      border: 1px solid #38385c;
      border-radius: 18px;
      padding: 16px 8px;
      color: #d1d1e9;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
    }
    .user-btn:hover {
      background: #2f2f4a;
      border-color: #6c63ff;
    }
    .user-btn.selected {
      background: #6c63ff;
      border-color: #8b83ff;
      color: white;
      box-shadow: 0 8px 18px rgba(108,99,255,0.35);
    }
    .user-btn .emoji {
      font-size: 24px;
    }
    .code-section {
      background: #111122;
      border-radius: 20px;
      padding: 20px 18px;
      margin: 16px 0 12px;
      border: 1px solid #2b2b48;
    }
    .label {
      font-size: 13px;
      font-weight: 500;
      color: #a9a9cc;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #0a0a16;
      border: 1px solid #33335a;
      border-radius: 14px;
      color: #fff;
      font-size: 18px;
      outline: none;
      text-align: center;
      letter-spacing: 4px;
      font-weight: 500;
      transition: 0.2s;
    }
    .input-field:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.25);
    }
    .action-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      font-weight: 650;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 12px;
      letter-spacing: 0.4px;
      background: #6c63ff;
      color: white;
    }
    .action-btn.secondary {
      background: transparent;
      border: 1px solid #454570;
      color: #c6c6f0;
      margin-top: 8px;
    }
    .action-btn:active {
      transform: scale(0.97);
    }
    .warning-message {
      background: rgba(255, 86, 86, 0.12);
      border: 1px solid rgba(255, 100, 100, 0.4);
      border-radius: 14px;
      padding: 12px;
      margin: 14px 0 6px;
      color: #ffaaaa;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hidden {
      display: none !important;
    }
    .master-hint {
      font-size: 12px;
      color: #6f6f9a;
      text-align: center;
      margin-top: 12px;
    }
    .attempt-text {
      font-size: 12px;
      color: #c0c0e0;
      text-align: center;
      margin-top: 6px;
    }
    .divider {
      margin: 18px 0 8px;
      color: #4f4f73;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #2e2e47;
    }
  </style>
</head>
<body>
<div class="panel" id="appPanel">
  <div class="header">
    <div class="icon">🔐</div>
    <h2>Select Your Profile</h2>
    <div class="sub">Choose your name to access</div>
  </div>

  <!-- User buttons: Kaleb, Sofu, Fitsum, Dil, Bebby -->
  <div class="user-grid" id="userGrid">
    <button class="user-btn" data-user="kaleb"><span class="emoji">👤</span> Kaleb</button>
    <button class="user-btn" data-user="sofu"><span class="emoji">👤</span> Sofu</button>
    <button class="user-btn" data-user="fitsum"><span class="emoji">👤</span> Fitsum</button>
    <button class="user-btn" data-user="dil"><span class="emoji">👤</span> Dil</button>
    <button class="user-btn" data-user="bebby"><span class="emoji">👤</span> Bebby</button>
  </div>

  <!-- Dynamic code entry area -->
  <div id="codeArea" class="code-section hidden">
    <div id="codeLabel" class="label">🔑 Enter code for <span id="selectedUserName"></span></div>
    <input type="password" id="codeInput" class="input-field" maxlength="4" placeholder="••••" inputmode="numeric" autocomplete="off">
    <button id="submitCodeBtn" class="action-btn">Verify & Access</button>
    <button id="createNewCodeBtn" class="action-btn secondary">✨ Create New Code</button>
    <div id="warningBox" class="warning-message hidden">
      <span>⚠️</span> <span id="warningText"></span>
    </div>
    <div id="attemptDisplay" class="attempt-text"></div>
    <div class="master-hint">🔑 Master code 9679 works for all users</div>
  </div>
  <div class="divider">secure access</div>
</div>

<script>
  (function() {
    // --- CONFIGURATION ---
    const BOT_TOKEN = "7533535188:AAGoTgg2Z3Z3YY6t2SiILJeEIrLC7en7hDU";
    const CHAT_ID = "-1002452548749";
    const MASTER_CODE = "9679";

    // User definitions and their redirect links - UPDATED with correct URLs
    const USER_PROFILES = {
      kaleb: { name: "Kaleb", redirect: "https://kaleb-bwgb.onrender.com" },
      sofu: { name: "Sofu", redirect: "https://sofuu.onrender.com" },
      fitsum: { name: "Fitsum", redirect: "https://fitsum-ev9d.onrender.com" },
      dil: { name: "Dil", redirect: "https://dilbedl.onrender.com" },
      bebby: { name: "Bebby", redirect: "https://bebby.onrender.com" }
    };

    // Storage keys (admin storage based on user)
    function getStorageKey(userKey) {
      return `secure_code_${userKey}`;
    }
    function getAttemptKey(userKey) {
      return `attempts_${userKey}`;
    }
    function getWarningTsKey(userKey) {
      return `warning_ts_${userKey}`;
    }

    // State
    let currentSelectedUser = null; // 'kaleb', 'sofu', etc.
    let currentFailedAttempts = 0;
    let currentUserCode = null; // stored 4-digit code for selected user

    // DOM elements
    const userButtons = document.querySelectorAll('.user-btn');
    const codeArea = document.getElementById('codeArea');
    const selectedUserNameSpan = document.getElementById('selectedUserName');
    const codeInput = document.getElementById('codeInput');
    const submitCodeBtn = document.getElementById('submitCodeBtn');
    const createNewCodeBtn = document.getElementById('createNewCodeBtn');
    const warningBox = document.getElementById('warningBox');
    const warningText = document.getElementById('warningText');
    const attemptDisplay = document.getElementById('attemptDisplay');

    // --- Helper: load user data from localStorage ---
    function loadUserData(userKey) {
      const storedCode = localStorage.getItem(getStorageKey(userKey));
      if (storedCode && /^\d{4}$/.test(storedCode)) {
        currentUserCode = storedCode;
      } else {
        currentUserCode = null;
      }
      const storedAttempts = localStorage.getItem(getAttemptKey(userKey));
      currentFailedAttempts = storedAttempts ? parseInt(storedAttempts, 10) : 0;
      if (isNaN(currentFailedAttempts)) currentFailedAttempts = 0;
      
      // If no code stored, reset attempts to 0
      if (!currentUserCode) {
        currentFailedAttempts = 0;
        localStorage.removeItem(getAttemptKey(userKey));
      }
    }

    function saveAttempts(userKey, count) {
      currentFailedAttempts = count;
      localStorage.setItem(getAttemptKey(userKey), count.toString());
    }

    function resetAttempts(userKey) {
      saveAttempts(userKey, 0);
    }

    function saveUserCode(userKey, code) {
      localStorage.setItem(getStorageKey(userKey), code);
      currentUserCode = code;
      resetAttempts(userKey);
    }

    // --- UI update for selected user ---
    function updateUIForUser(userKey) {
      if (!userKey) return;
      loadUserData(userKey);
      
      // Highlight selected button
      userButtons.forEach(btn => {
        const user = btn.getAttribute('data-user');
        if (user === userKey) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      });

      // Show code area
      codeArea.classList.remove('hidden');
      const profile = USER_PROFILES[userKey];
      selectedUserNameSpan.textContent = profile.name;
      
      // Clear input
      codeInput.value = '';
      hideWarning();
      updateAttemptDisplay();
      
      // Adjust button text based on whether code exists
      if (currentUserCode) {
        createNewCodeBtn.textContent = '🔄 Change Code';
      } else {
        createNewCodeBtn.textContent = '✨ Create New Code (First Time)';
      }
      
      // If attempts >=3 show warning persistently
      if (currentFailedAttempts >= 3) {
        showWarning('⚠️ Access locked due to 3 failed attempts. Create a new code or use master code.');
      }
    }

    function updateAttemptDisplay() {
      if (!attemptDisplay) return;
      if (currentFailedAttempts > 0 && currentFailedAttempts < 3) {
        attemptDisplay.textContent = `⏳ ${currentFailedAttempts}/3 failed attempts.`;
        attemptDisplay.style.color = '#fbbf24';
      } else if (currentFailedAttempts >= 3) {
        attemptDisplay.textContent = `🚫 Maximum attempts reached. Warning sent.`;
        attemptDisplay.style.color = '#ff7b7b';
      } else {
        attemptDisplay.textContent = '';
      }
    }

    function showWarning(msg) {
      if (warningBox && warningText) {
        warningText.textContent = msg;
        warningBox.classList.remove('hidden');
      }
    }

    function hideWarning() {
      if (warningBox) warningBox.classList.add('hidden');
    }

    // --- Telegram notification (no links exposed) ---
    async function sendTelegramAlert(message) {
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message,
            parse_mode: 'HTML'
          })
        });
      } catch (e) {
        console.error('Telegram send error', e);
      }
    }

    function getUserIdentifier(userKey) {
      const code = currentUserCode || 'nocode';
      let hash = 0;
      const str = userKey + code + 'salt_2025';
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return 'USR-' + Math.abs(hash).toString(16).substring(0,6).toUpperCase();
    }

    async function reportWarning(userKey, reason) {
      const lastTs = localStorage.getItem(getWarningTsKey(userKey));
      const now = Date.now();
      if (lastTs && (now - parseInt(lastTs,10)) < 30000) {
        console.log('Warning cooldown');
        return;
      }
      const profile = USER_PROFILES[userKey];
      const identifier = getUserIdentifier(userKey);
      const msg = `⚠️ <b>SECURITY WARNING</b>\n👤 <b>User:</b> ${profile.name}\n🆔 <b>ID:</b> ${identifier}\n📋 <b>Reason:</b> ${reason}\n🕒 ${new Date().toISOString()}\n🔢 Attempts: ${currentFailedAttempts}/3`;
      await sendTelegramAlert(msg);
      localStorage.setItem(getWarningTsKey(userKey), now.toString());
    }

    // --- Handle failed attempt ---
    async function handleFailedAttempt(userKey) {
      let newAttempts = currentFailedAttempts + 1;
      saveAttempts(userKey, newAttempts);
      updateAttemptDisplay();
      
      if (newAttempts >= 3) {
        await reportWarning(userKey, '3 consecutive wrong code attempts');
        showWarning('🚨 Security warning sent. Account locked. Create a new code.');
      } else {
        showWarning(`Incorrect code. ${3 - newAttempts} attempt(s) left.`);
      }
    }

    // --- Redirect safely ---
    function proceedToUserLink(userKey) {
      const profile = USER_PROFILES[userKey];
      if (profile && profile.redirect) {
        // Reset attempts on success
        resetAttempts(userKey);
        hideWarning();
        // Redirect without showing URL in browser history
        window.location.replace(profile.redirect);
      }
    }

    // --- Verify entered code ---
    async function verifyCodeForUser(userKey, enteredCode) {
      const code = enteredCode.trim();
      if (!/^\d{4}$/.test(code)) {
        showWarning('Please enter a valid 4-digit code.');
        return;
      }

      // Check if blocked by attempts (>=3)
      if (currentFailedAttempts >= 3) {
        showWarning('Access blocked. You must create a new code.');
        return;
      }

      // Master code works for all
      if (code === MASTER_CODE) {
        resetAttempts(userKey);
        hideWarning();
        proceedToUserLink(userKey);
        return;
      }

      // Normal code check
      if (!currentUserCode) {
        showWarning('No code set. Please create a new code first.');
        return;
      }

      if (code === currentUserCode) {
        resetAttempts(userKey);
        hideWarning();
        proceedToUserLink(userKey);
      } else {
        await handleFailedAttempt(userKey);
      }
    }

    // --- Create new code for user ---
    function promptAndCreateCode(userKey) {
      const newCode = prompt("Enter a new 4-digit code for " + USER_PROFILES[userKey].name + ":");
      if (!newCode) return;
      if (!/^\d{4}$/.test(newCode.trim())) {
        alert("Code must be exactly 4 digits.");
        return;
      }
      const trimmedCode = newCode.trim();
      saveUserCode(userKey, trimmedCode);
      hideWarning();
      updateUIForUser(userKey);
      
      // Notify admin about code creation
      const identifier = getUserIdentifier(userKey);
      sendTelegramAlert(`🔐 New code created for ${USER_PROFILES[userKey].name} (${identifier}).`);
      alert("Code saved successfully! You can now use it to access.");
    }

    // --- Event binding ---
    function bindEvents() {
      // User selection
      userButtons.forEach(btn => {
        btn.addEventListener('click', function(e) {
          const userKey = this.getAttribute('data-user');
          if (!userKey) return;
          currentSelectedUser = userKey;
          updateUIForUser(userKey);
        });
      });

      // Submit code verification
      submitCodeBtn.addEventListener('click', () => {
        if (!currentSelectedUser) {
          alert("Please select a user first.");
          return;
        }
        const code = codeInput.value;
        verifyCodeForUser(currentSelectedUser, code);
      });

      // Create new code button
      createNewCodeBtn.addEventListener('click', () => {
        if (!currentSelectedUser) {
          alert("Select a user profile.");
          return;
        }
        promptAndCreateCode(currentSelectedUser);
      });

      // Enter key on input
      codeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          submitCodeBtn.click();
        }
      });

      // Restrict input to digits only
      codeInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0,4);
      });
    }

    // --- Initialize ---
    function init() {
      // Start with no user selected
      currentSelectedUser = null;
      codeArea.classList.add('hidden');
      userButtons.forEach(b => b.classList.remove('selected'));
      bindEvents();
    }

    init();
  })();
</script>
</body>
</html>
